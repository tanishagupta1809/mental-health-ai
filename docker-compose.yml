version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mental-health-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mental-health-ai
    volumes:
      - mongodb_data:/data/db
    networks:
      - mental-health-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mental-health-backend
    ports:
      - "5050:5050"
    environment:
      MONGO_URI: mongodb://mongodb:27017/mental-health-ai
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      PORT: 5050
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - mental-health-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mental-health-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5050/api
    depends_on:
      - backend
    networks:
      - mental-health-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: mental-health-ml
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
    networks:
      - mental-health-network
    volumes:
      - ./ml-service:/app

volumes:
  mongodb_data:

networks:
  mental-health-network:
    driver: bridge
